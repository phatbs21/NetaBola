version: "3.8"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netabola_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  postgres-products:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netabola_products
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
  postgres-cart:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netabola_cart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netabola_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
  postgres-loyalty:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netabola_loyalty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
