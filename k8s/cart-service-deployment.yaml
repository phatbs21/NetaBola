apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: netabola
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: netabola/cart-service:latest
          ports:
            - containerPort: 8083
