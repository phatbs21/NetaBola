apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: netabola
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: netabola/api-gateway:latest
          ports:
            - containerPort: 8080
