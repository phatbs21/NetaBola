server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/carts/**
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/orders/**,/api/checkout/**
        - id: loyalty-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/loyalty/**
  data:
    redis:
      host: localhost
      port: 6379
resilience4j:
  circuitbreaker:
    instances:
      auth-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
